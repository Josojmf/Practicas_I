<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1>File Upload Service</h1>
        <nav>
            <nav>
                <a href="{{ url_for('main.index') }}">Home</a>
                <a href="{{ url_for('main.list_files') }}">Files</a>
                <a href="{{ url_for('main.weather') }}">Weather</a>
                <a href="{{ url_for('main.chat') }}">Chat</a>

            </nav>
        </nav>
    </header>
    <div class="container">
        <h2>Upload a File</h2>
        <form action="{{ url_for('main.upload_file') }}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
        <a href="{{ url_for('main.list_files') }}">See all files</a>
        <a href="{{ url_for('main.chat') }}">Chat</a>
    </div>
    <footer>
        <p>&copy; 2023 File Upload Service</p>
    </footer>
</body>
</html>
